
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEDRO PHGF | Links</title>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
      url('img/bailer.jpeg');
      background-size:cover;
      background-position:center;
      padding:20px;
      color:white;
    }

    .card{
      width:100%;
      max-width:420px;
      backdrop-filter:blur(18px);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:30px;
      padding:35px 28px;
      text-align:center;
      box-shadow:0 15px 50px rgba(0,0,0,0.4);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .profile-img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid rgba(255,255,255,0.3);
      margin-bottom:18px;
      box-shadow:0 8px 25px rgba(0,0,0,0.4);
    }

    h1{
      font-size:30px;
      font-weight:700;
      margin-bottom:8px;
    }

    .bio{
      font-size:14px;
      color:#d8d8d8;
      margin-bottom:30px;
      line-height:1.6;
    }

    .links{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .link-btn{
      text-decoration:none;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.12);
      padding:16px;
      border-radius:18px;
      font-size:17px;
      font-weight:500;
      transition:0.3s ease;
      position:relative;
      overflow:hidden;
    }

    .link-btn::before{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:-100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition:0.5s;
    }

    .link-btn:hover::before{
      left:100%;
    }

    .link-btn:hover{
      transform:translateY(-3px) scale(1.02);
      background:rgba(255,255,255,0.16);
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    .instagram:hover{
      border-color:#ff4fa3;
    }

    .letterboxd:hover{
      border-color:#00e054;
    }

    .imdb:hover{
      border-color:#f5c518;
    }

    .link-btn i{
      font-size:22px;
    }

    .twitter:hover{
  border-color:#ffffff;
    }

    .footer{
      margin-top:30px;
      font-size:12px;
      color:#bdbdbd;
    }

    @media(max-width:480px){

      .card{
        padding:28px 20px;
      }

      h1{
        font-size:26px;
      }

      .link-btn{
        font-size:16px;
        padding:15px;
      }

    }

  </style>
</head>

<body>

  <div class="card">

    <!-- SUA FOTO -->
    <img
      class="profile-img"
      src="img/foto.1.jpeg"
      alt="PEDRO PHGF"
    >

    <h1>PEDRO PHGF</h1>



    <div class="links">

      <a
        class="link-btn instagram"
        href="https://instagram.com/_pedro_phgf"
        target="_blank"
      >
        <i class="fa-brands fa-instagram"></i>
        Instagram
      </a>

      <a
        class="link-btn letterboxd"
        href="https://letterboxd.com/pedro_phgf/"
        target="_blank"
      >
        <i class="fa-solid fa-film"></i>
        Letterboxd
      </a>

      <a
        class="link-btn imdb"
        href="https://imdb.com/user/p.hnakxksesuoubx5r5sbwzbdogu?ref_=ext_shr_lnk"
        target="_blank"
      >
        <i class="fa-brands fa-imdb"></i>
        IMDb
      </a>

      <a
        class="link-btn twitter"
        href="https://x.com/Pphgf_812"
        target="_blank"
>
        <i class="fa-brands fa-x-twitter"></i>
        X / Twitter
       </a>

    </div>

    <div class="footer">
      © 2026 Pedro Gonçalves
    </div>

  </div>

</body>
</html>
